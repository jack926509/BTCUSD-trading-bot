account:
  currency: USD
  max_daily_loss_pct: 0.02
  max_weekly_loss_pct: 0.05

position:
  risk_per_trade_pct: 0.01
  max_concurrent_trades: 1
  max_single_symbol_pct: 0.10
  min_rrr: 1.5

btcusd:
  min_notional_usd: 1
  max_notional_usd: 5000
  spread_filter_pct: 0.001
  limit_order_timeout_seconds: 300

circuit_breaker:
  consecutive_losses: 3
  pause_hours: 4
  persist_state: true

hard_sl:
  enabled: true
  buffer_pct: 0.003

server_side_stop:
  enabled: true
  buffer_pct: 0.005

# Paper Testing 階段維持 false；確認策略品質後改 true
auto_trade: false
