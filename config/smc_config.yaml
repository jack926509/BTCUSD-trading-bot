version: "7.0"

timeframes:
  htf: "H4"
  mtf: "H1"
  ltf: "M1"

htf_bars: 200
ltf_bars: 100

structure:
  bos:
    min_swing_bars: 5
  choch:
    require_displacement: true
    displacement_min_candles: 2

liquidity:
  order_block:
    enabled: true
    max_age_bars: 60        # M1×60 = 1 h; keeps OBs fresh and relevant
    min_body_ratio: 0.55
    mitigation_type: close
    wick_penetration_threshold: 0.7
    # P1-6: OB 前驅蠟燭需 volume > 近 20 根均量 × 1.5
    volume_multiplier: 1.5
  fair_value_gap:
    enabled: true
    min_gap_usd: 40         # M1 FVGs are smaller; $40 filters micro-gaps
    partial_fill_threshold: 0.5
  equal_highs_lows:
    enabled: true
    tolerance_usd: 80       # tighter EQL tolerance on M1
  breaker_block:
    enabled: true
  sweep:
    enabled: true
    wick_ratio: 2.0
    require_htf_alignment: true

entry:
  require_htf_alignment: true

  bos_entry_model: ob_fvg
  choch_entry_model: fvg_only
  sweep_entry_model: ob_fvg

  # E1: Premium/Discount 濾波 — BUY 只在 HTF range 下半，SELL 只在上半
  premium_discount:
    enabled: true
    range_source: htf
    discount_threshold: 0.5   # 低於中線視為 discount
    strong_trend_relax_bars: 8

  # E2: OB + FVG 疊加區視為高 confluence，conditions_met 會標記 CONFLUENCE
  confluence:
    enabled: true
    require_overlap: true

  # E3: 拒絕蠟燭確認 — 觸發 bar 需穿入 zone 後收回外側且含長影線
  rejection_candle:
    enabled: true
    min_wick_ratio: 1.2       # 影線 / 實體

  # E4: OB 中點進場 — entry = OB_low + 25% × OB range（BUY）
  ob_entry_mode: midpoint     # midpoint / edge

  # E5: ATR-based SL — 取代固定 0.5% buffer
  atr_sl:
    enabled: true
    atr_period: 14
    atr_multiplier: 1.5
    atr_timeframe: M1         # 目前系統 MTF 緩存只到 M1/H1/H4，挑 M1 x 14 根≈15 分鐘波動
    min_sl_pct: 0.003         # 下限 0.3%
    max_sl_pct: 0.015         # 上限 1.5%

  # E6: OTE（Optimal Trade Entry）Fibonacci 過濾
  ote:
    enabled: true
    min_retrace: 0.62
    max_retrace: 0.79

  session_filter:
    enabled: true
    # Only trade London + NY sessions (07:00–20:00 UTC) — highest BTC liquidity.
    # Block everything else: NY close, full Asia, pre-London.
    no_entry_sessions:
      - name: "Low_Liquidity"
        utc_start: "20:00"
        utc_end:   "07:00"
    session_open_cooldown_bars: 2
    affect_open_positions: false

signal_logic:
  ltf_trigger_alignment: strict

ai:
  model: "claude-haiku-4-5-20251001"
  max_tokens: 600
  timeout_seconds: 10
  role: "describer"
  forbidden_elements:
    - "DXY"
    - "VIX"
    - "非農"
    - "聯準會"
    - "利率"
    - "通膨"
    - "CPI"
    - "ETF 申購"
    - "鏈上數據"
    - "新聞"
    - "財報"
    - "信心"
    - "勝率"
